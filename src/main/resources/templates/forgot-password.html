<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | The Fashion Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #fdf2e9 0%, #fff0f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: #2b1b10;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            border: 1.5px solid #eee;
            transition: var(--transition);
        }
        .btn-auth {
            background: linear-gradient(90deg, #ed1275 0%, #fa891a 100%);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: var(--transition);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(237, 18, 117, 0.2);
            color: white;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header text-center mb-5">
            <div class="mb-4">
                <i class="fa-solid fa-key fa-3x text-theme"></i>
            </div>
            <h2 class="mb-2">Reset Password</h2>
            <p id="stepDescription" class="text-muted text-center">Enter your email and we'll send you an OTP to reset your password.</p>
        </div>

        <!-- Step 1: Email -->
        <div id="stepEmail">
            <div class="mb-4">
                <label class="form-label small fw-bold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                    <input type="email" id="emailInput" class="form-control border-start-0" placeholder="name@example.com">
                </div>
            </div>
            <button type="button" onclick="requestOtp()" class="btn-auth mb-4">SEND OTP</button>
        </div>

        <!-- Step 2: OTP -->
        <div id="stepOtp" style="display: none;">
            <div class="mb-4">
                <label class="form-label small fw-bold">Enter 6-Digit OTP</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-shield-halved text-muted"></i></span>
                    <input type="text" id="otpInput" class="form-control border-start-0" placeholder="000000" maxlength="6">
                </div>
                <small class="text-muted mt-1 d-block">Please check your email for the OTP.</small>
            </div>
            <button type="button" onclick="verifyOtp()" class="btn-auth mb-4">VERIFY OTP</button>
        </div>

        <!-- Step 3: New Password -->
        <div id="stepPassword" style="display: none;">
            <div class="mb-3">
                <label class="form-label small fw-bold">New Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" id="newPassInput" class="form-control border-start-0" placeholder="••••••••">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" id="confirmPassInput" class="form-control border-start-0" placeholder="••••••••">
                </div>
            </div>
            <button type="button" onclick="resetPassword()" class="btn-auth mb-4">UPDATE PASSWORD</button>
        </div>

        <div id="alertBox" class="alert d-none small py-2 text-center mb-4"></div>

        <div class="text-center small">
            <a th:href="@{/?login=true}" class="text-muted text-decoration-none"><i class="fa-solid fa-arrow-left me-2"></i> Back to Login</a>
        </div>
    </div>

    <script>
        let currentEmail = "";
        let currentOtp = "";

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.className = `alert alert-${type} small py-2 text-center mb-4`;
        }

        async function requestOtp() {
            const email = document.getElementById('emailInput').value;
            if(!email) return showAlert("Please enter your email.", "danger");

            const res = await fetch(`/api/auth/request-otp?email=${email}`, { method: 'POST' });
            const data = await res.text();

            if (data === "OTP_SENT") {
                currentEmail = email;
                document.getElementById('stepEmail').style.display = 'none';
                document.getElementById('stepOtp').style.display = 'block';
                document.getElementById('stepDescription').innerText = "Step 2: Enter the verification code sent to your email.";
                showAlert("OTP has been sent successfully!", "success");
            } else {
                showAlert("Email not found in our records.", "danger");
            }
        }

        async function verifyOtp() {
            const otp = document.getElementById('otpInput').value;
            if(!otp) return showAlert("Please enter the OTP.", "danger");

            const res = await fetch(`/api/auth/verify-otp?email=${currentEmail}&otp=${otp}`, { method: 'POST' });
            const data = await res.text();

            if (data === "OTP_VERIFIED") {
                currentOtp = otp;
                document.getElementById('stepOtp').style.display = 'none';
                document.getElementById('stepPassword').style.display = 'block';
                document.getElementById('stepDescription').innerText = "Step 3: Create your new secure password.";
                showAlert("OTP Verified! Set your new password.", "success");
            } else {
                showAlert("Invalid or expired OTP. Please try again.", "danger");
            }
        }

        async function resetPassword() {
            const newPass = document.getElementById('newPassInput').value;
            const confirmPass = document.getElementById('confirmPassInput').value;

            if(!newPass || newPass !== confirmPass) {
                return showAlert("Passwords do not match or are empty.", "danger");
            }

            const res = await fetch(`/api/auth/reset-password?email=${currentEmail}&otp=${currentOtp}&newPassword=${newPass}`, { method: 'POST' });
            const data = await res.text();

            if (data === "SUCCESS") {
                showAlert("Password updated successfully! Redirecting to login...", "success");
                setTimeout(() => window.location.href = "/?login=true", 2000);
            } else {
                showAlert("Failed to update password. Session may have expired.", "danger");
            }
        }
    </script>
</body>
</html>
