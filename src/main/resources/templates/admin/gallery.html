<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Management | Fashion Institute</title>
    <link rel="stylesheet" th:href="@{/css/admin-premium.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .gallery-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
        }
        .gallery-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .gallery-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-info {
            padding: 1rem;
        }
        .card-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: block;
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(244, 63, 94, 0.9);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .delete-btn:hover {
            background: #f43f5e;
            transform: scale(1.1);
        }
        .upload-panel {
            background: rgba(255, 255, 255, 0.8);
            border: 2px dashed rgba(0,0,0,0.1);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 3rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-skating"></i>
            <span>FashionInst.</span>
        </div>
        <ul class="nav-links">
            <li><a th:href="@{/admin/dashboard}"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a th:href="@{/admin/students}"><i class="fas fa-user-graduate"></i> Students</a></li>
            <li><a th:href="@{/admin/colleges}"><i class="fas fa-store"></i> Colleges</a></li>
            <li><a th:href="@{/admin/courses}"><i class="fas fa-book-open"></i> Courses</a></li>
            <li><a th:href="@{/admin/gallery}" class="active"><i class="fas fa-camera"></i> Photos</a></li>
            <li><a th:href="@{/admin/settings}"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="logout" style="margin-top: auto;">
            <a th:href="@{/}" style="color: var(--primary); margin-bottom: 0.5rem;"><i class="fas fa-home"></i> Back to Home</a>
            <a th:href="@{/logout}" style="color: var(--secondary);"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div class="welcome">
                <h1>Gallery Management</h1>
                <p>Upload and categorize photos for the landing page gallery.</p>
            </div>
        </header>

        <!-- Upload Form -->
        <div class="panel">
            <h2 style="margin-bottom: 1.5rem;">Add New Photo</h2>
            <form th:action="@{/admin/gallery/save}" method="post" enctype="multipart/form-data" th:object="${newImage}">
                <div class="row" style="display: flex; gap: 1rem; align-items: flex-end;">
                    <div class="form-group" style="flex: 1;">
                        <label>Category</label>
                        <select th:field="*{category}" required>
                            <option value="Fashion Designing">Fashion Designing</option>
                            <option value="Interior Designing">Interior Designing</option>
                            <option value="Shoe Designing">Shoe Designing</option>
                            <option value="Jewellery Designing">Jewellery Designing</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Select Photo</label>
                        <input type="file" name="file" accept="image/*" required />
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <button type="submit" style="padding: 0.8rem 2rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;">
                            <i class="fas fa-upload"></i> Upload Photo
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Gallery Preview -->
        <div class="panel" style="margin-top: 2rem;">
            <h2>Current Photos</h2>
            <div class="gallery-grid">
                <div class="gallery-card" th:each="img : ${images}">
                    <img th:src="${img.imageUrl}" th:alt="${img.title}">
                    <a th:href="@{/admin/gallery/delete/{id}(id=${img.id})}" class="delete-btn" onclick="return confirm('Delete this photo?')">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                    <div class="card-info">
                        <span class="card-category" th:text="${img.category}">Category</span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(images)}" style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">
                    No photos uploaded yet.
                </div>
            </div>
        </div>
    </main>
</body>

</html>
