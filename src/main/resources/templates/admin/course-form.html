<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${course.id == null ? 'Create Course | Fashion Institute' : 'Edit Course | Fashion Institute'}">Course Form</title>
    <link rel="stylesheet" th:href="@{/css/admin-premium.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            background: white;
            font-family: inherit;
        }
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        .btn-submit {
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 137, 26, 0.3);
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-skating"></i>
            <span>FashionInst.</span>
        </div>
        <ul class="nav-links">
            <li><a th:href="@{/admin/dashboard}"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a th:href="@{/admin/students}"><i class="fas fa-user-graduate"></i> Students</a></li>
            <li><a th:href="@{/admin/colleges}"><i class="fas fa-store"></i> Colleges</a></li>
            <li><a th:href="@{/admin/courses}" class="active"><i class="fas fa-book-open"></i> Courses</a></li>
            <li><a th:href="@{/admin/gallery}"><i class="fas fa-camera"></i> Photos</a></li>
            <li><a th:href="@{/admin/settings}"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="logout" style="margin-top: auto;">
            <a th:href="@{/}" style="color: var(--primary); margin-bottom: 0.5rem;"><i class="fas fa-home"></i> Back to Home</a>
            <a th:href="@{/logout}" style="color: var(--secondary);"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div class="welcome">
                <h1 th:text="${course.id == null ? 'Create New Course' : 'Edit Course'}">Course Form</h1>
                <p>Fill in the details to publish a new fashion program.</p>
            </div>
        </header>

        <div class="panel form-container">
            <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" th:field="*{title}" placeholder="e.g., Master in Couture Design" required />
                </div>

                <div class="row" style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Instructor Name</label>
                        <input type="text" th:field="*{instructorName}" placeholder="e.g., Prof. Elena Rodriguez" required />
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Category</label>
                        <select th:field="*{category}">
                            <option value="Fashion Designing">Fashion Designing</option>
                            <option value="Jewellery Designing">Jewellery Designing</option>
                            <option value="Interior Designing">Interior Designing</option>
                            <option value="Shoe Designing">Shoe Designing</option>
                            <option value="Photography">Photography</option>
                            <option value="Beauty and Grooming">Beauty and Grooming</option>
                        </select>
                    </div>
                </div>

                <div class="row" style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Duration</label>
                        <input type="text" th:field="*{duration}" placeholder="e.g., 6 Months" required />
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Price (₹)</label>
                        <input type="number" step="0.01" th:field="*{price}" placeholder="e.g., 45000" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" th:field="*{imageUrl}" placeholder="/images/course-default.png" />
                </div>

                <div class="form-group">
                    <label>Course Description</label>
                    <textarea th:field="*{description}" placeholder="Provide a detailed overview of the program..."></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <a th:href="@{/admin/courses}" style="padding: 1rem 2rem; background: #eee; color: var(--text-main); border-radius: 12px; text-decoration: none; font-weight: 600;">Cancel</a>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Save Course
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
