<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | The Fashion Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/premium-dashboards.css}">
    <style>
        .register-card {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .form-label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (Reused) -->
        <div class="dashboard-sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-feather-pointed"></i> <span>F.INSTITUTE</span>
            </div>
            <ul class="sidebar-nav">
                <li><a th:href="@{/college/dashboard}"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                <li><a th:href="@{/college/applications}" class="active"><i class="fa-solid fa-file-signature"></i> <span>Student Inquiries</span></a></li>
                <li><a th:href="@{/college/courses}"><i class="fa-solid fa-book-open"></i> <span>My Courses</span></a></li>
                <li><a th:href="@{/college/students}"><i class="fa-solid fa-users"></i> <span>Students</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="dashboard-content">
            <div class="dashboard-header">
                <div>
                    <h2 class="fw-bold mb-1">Create Student Credentials</h2>
                    <p class="text-muted small">Generate login access for newly enrolled students.</p>
                </div>
                <a th:href="@{/college/applications}" class="btn btn-light rounded-pill px-4">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Inquiries
                </a>
            </div>

            <div class="register-card">
                <form th:action="@{/college/process-registration}" method="post">
                    <div class="mb-4">
                        <label class="form-label">Student Full Name</label>
                        <input type="text" name="name" class="form-control custom-input" th:value="${name}" required placeholder="Full Name">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control custom-input" th:value="${email}" required placeholder="email@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-control custom-input" th:value="${phone}" placeholder="+91 00000 00000">
                    </div>
                    <hr class="my-4 opacity-10">
                    <div class="mb-4">
                        <label class="form-label">Desired User ID / Username</label>
                        <input type="text" name="username" class="form-control custom-input" required placeholder="Choose a unique username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Access Password</label>
                        <div class="input-group">
                            <input type="password" name="password" id="password" class="form-control custom-input" required placeholder="••••••••">
                            <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePass()">
                                <i class="fa-solid fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-dash w-100 py-3 mt-3">
                        <i class="fa-solid fa-user-plus me-2"></i> Create Credentials & Register
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                passInput.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }
    </script>
</body>
</html>
