<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | The Fashion Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #e9f5fd 0%, #f0f5ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.5);
            border-top: 5px solid #0d6efd;
        }
        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: #1a2b4c;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            border: 1.5px solid #eee;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }
        .btn-auth {
            background: linear-gradient(90deg, #0d6efd 0%, #00d2ff 100%);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: var(--transition);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
            color: white;
        }
        .auth-footer a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }
        .student-badge {
            display: inline-block;
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header text-center mb-5">
            <!-- Error Alert -->
            <div th:if="${param.error}" class="alert alert-danger border-0 rounded-4 mb-4 small text-start">
                <i class="fa-solid fa-circle-exclamation me-2"></i> Invalid User ID or password.
            </div>
            <!-- Logout Alert -->
            <div th:if="${param.logout}" class="alert alert-info border-0 rounded-4 mb-4 small text-start">
                <i class="fa-solid fa-circle-info me-2"></i> You have been logged out.
            </div>
            
            <div class="student-badge"><i class="fa-solid fa-graduation-cap me-2"></i>Student Portal</div>
            <h2 class="mb-2">Student Login</h2>
            <p class="text-muted small">Enter your college-issued credentials to access your dashboard.</p>
        </div>
        
        <!-- We submit to the standard Spring Security /login endpoint -->
        <form th:action="@{/login}" method="post">
            <div class="mb-4">
                <label class="form-label small fw-bold">User ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-regular fa-id-badge text-muted"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="Enter your User ID" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                </div>
            </div>
            <div class="d-flex justify-content-between mb-4 small">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a th:href="@{/forgot-password}" class="text-primary">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-auth mb-4">ACCESS PORTAL</button>
        </form>
        
        <div class="auth-footer text-center small mt-4 pt-3 border-top">
            <a th:href="@{/}" class="text-muted"><i class="fa-solid fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </div>
</body>
</html>
