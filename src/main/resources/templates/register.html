<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The Fashion Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #fdf2e9 0%, #fff0f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .auth-header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: #2b1b10;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            border: 1.5px solid #eee;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--theme-main);
            box-shadow: 0 0 0 4px rgba(250, 137, 26, 0.1);
        }
        .btn-auth {
            background: linear-gradient(90deg, #ed1275 0%, #fa891a 100%);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: var(--transition);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(237, 18, 117, 0.2);
            color: white;
        }
        .auth-footer a {
            color: #ed1275;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header text-center mb-4">
            <h2 class="mb-2">Create Account</h2>
            <p class="text-muted">Join the elite fashion community</p>
        </div>
        <form th:action="@{/register}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose username" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Date of Birth</label>
                    <input type="date" name="dob" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="" selected disabled>Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Register As</label>
                    <select name="role" class="form-select" required>
                        <option value="STUDENT" selected>Student / Learner</option>
                        <option value="College">College / Instructor</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent">+91</span>
                        <input type="tel" name="phone" class="form-control" placeholder="9876543210" required>
                    </div>
                </div>
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">I agree to the <a href="#" class="text-theme">Terms & Conditions</a></label>
            </div>
            <button type="submit" class="btn-auth mb-4">REGISTER NOW</button>
        </form>
        <div class="auth-footer text-center small">
            Already have an account? <a th:href="@{/?login=true}">Login Here</a>
        </div>
    </div>
</body>
</html>
