<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings | Fashion Institute</title>
    <link rel="stylesheet" th:href="@{/css/admin-premium.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #fa891a !important;
            --secondary: #ed1275 !important;
            --bg-light: #fdf2e9 !important;
            --card-bg: rgba(255, 255, 255, 0.9) !important;
            --sidebar-bg: #ffffff !important;
            --text-main: #2b1b10 !important;
            --text-muted: #6b7280 !important;
        }
        body {
            background: linear-gradient(135deg, #fdf2e9 0%, #fff0f5 100%) !important;
            color: #2b1b10 !important;
        }
        .sidebar {
            background-color: #ffffff !important;
            border-right: 1px solid rgba(0,0,0,0.08) !important;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }
        .settings-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid #eee;
            background: #fcfcfc;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(250, 137, 26, 0.1);
        }
        .btn-save {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(237, 18, 117, 0.2);
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-skating"></i>
            <span>FashionInst.</span>
        </div>
        <ul class="nav-links">
            <li><a th:href="@{/admin/dashboard}"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a th:href="@{/admin/students}"><i class="fas fa-user-graduate"></i> Students</a></li>
            <li><a th:href="@{/admin/colleges}"><i class="fas fa-store"></i> Colleges</a></li>
            <li><a th:href="@{/admin/courses}"><i class="fas fa-book-open"></i> Courses</a></li>
            
            <li><a th:href="@{/admin/events}"><i class="fas fa-calendar-alt"></i> Events</a></li>
            <li><a th:href="@{/admin/settings}" class="active"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="logout" style="margin-top: auto;">
            <a th:href="@{/}" style="color: var(--primary); margin-bottom: 0.5rem;"><i class="fas fa-home"></i> Back to Home</a>
            <a th:href="@{/logout}" style="color: var(--secondary);"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div class="welcome">
                <h1>Platform Settings</h1>
                <p>Configure your fashion institute platform preferences.</p>
            </div>
            <div class="user-profile">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=100&h=100" alt="Admin Profile">
                <span>Admin User</span>
            </div>
        </header>

        <div class="settings-grid">
            <!-- Profile Settings -->
            <div class="settings-card">
                <h2 class="mb-4"><i class="fas fa-user-circle text-theme me-2"></i> Admin Profile</h2>
                <div class="form-group">
                    <label>Admin Name</label>
                    <input type="text" value="Admin User">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="admin@fashioninstitute.com">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Leave blank to keep current">
                </div>
                <button class="btn-save">Update Profile</button>
            </div>

            <!-- Platform Configuration -->
            <div class="settings-card">
                <h2 class="mb-4"><i class="fas fa-sliders-h text-theme me-2"></i> General Settings</h2>
                <div class="form-group">
                    <label>Institute Name</label>
                    <input type="text" value="The Fashion Institute">
                </div>
                <div class="form-group">
                    <label>Maintenance Mode</label>
                    <select>
                        <option>Disabled</option>
                        <option>Enabled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contact Email</label>
                    <input type="email" value="contact@fashioninstitute.com">
                </div>
                <button class="btn-save">Save Changes</button>
            </div>
        </div>
    </main>
</body>

</html>
