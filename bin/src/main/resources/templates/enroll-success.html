<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Successful | The Fashion Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #fff; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .success-card { max-width: 500px; text-align: center; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); background: white; }
        .success-icon { font-size: 80px; color: #25D366; margin-bottom: 25px; animation: scaleIn 0.5s ease; }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        .confetti { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h2 class="fw-bold mb-3">Enrollment Successful!</h2>
        <p class="text-muted mb-4">Congratulations! You have successfully enrolled in <strong th:text="${course.title}">the program</strong>. Your journey into the world of fashion starts today.</p>
        
        <div class="p-3 bg-light rounded-4 mb-4 text-start">
            <div class="d-flex justify-content-between mb-2">
                <span class="small text-muted">Order ID:</span>
                <span class="small fw-bold" th:text="${'ORD-' + T(java.util.UUID).randomUUID().toString().substring(0,8).toUpperCase()}">ORD-12345</span>
            </div>
            <div class="d-flex justify-content-between">
                <span class="small text-muted">Amount Paid:</span>
                <span class="small fw-bold text-success" th:text="${'₹' + course.price}">₹180,000</span>
            </div>
        </div>

        <div class="d-grid gap-3">
            <a th:href="@{/user/dashboard}" class="btn btn-dark btn-lg rounded-pill fw-bold py-3">Go to My Dashboard</a>
            <p class="mb-0 small text-muted">A confirmation email has been sent to your registered address.</p>
        </div>
    </div>

    <!-- Simple confetti effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff6b35', '#2d3436', '#25D366']
        });
    </script>
</body>
</html>
